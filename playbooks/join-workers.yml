- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_cmd
  delegate_to: master
  run_once: true

- name: Reset worker
  shell: |
    kubeadm reset -f
    rm -rf /etc/kubernetes
  ignore_errors: yes

- name: Join cluster
  command: "{{ join_cmd.stdout }}"
